spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: carry-porter
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:carry_porter}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
  data:
    redis:
      host: ${REDIS_HOST:localhost}      # Redis 서버 host. 로컬은 localhost, docker compose 환경에서는 redis service name 사용.
      port: ${REDIS_PORT:6379}           # Redis 서버 port.
      timeout: ${REDIS_TIMEOUT:2000ms}   # Redis 명령 처리 대기 시간.
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}  # Hibernate가 출력하는 SQL을 보기 좋게 줄바꿈과 들여쓰기로 정렬.
    show-sql: ${JPA_SHOW_SQL:true}          # 실행되는 SQL을 로그에 출력.

carry-porter:
  jwt:
    secret: ${JWT_SECRET:carry-porter-jwt-secret-key-carry-porter-2026} # JWT 서명에 사용할 비밀 키. 운영 환경에서는 반드시 별도 secret으로 관리.
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}      # access token 만료 시간(ms).
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:1209600000} # refresh token 만료 시간(ms). 기본값은 14일.
  redis:
    pub-sub:
      notification-channel: ${REDIS_NOTIFICATION_CHANNEL:carry-porter:notification} # 인스턴스 간 알림 전파에 사용할 Redis Pub/Sub 채널명.
  notification:
    cleanup:
      retention-days: ${NOTIFICATION_RETENTION_DAYS:3}                   # 알림을 보관할 기간(일). 이 기간이 지나면 스케줄러가 삭제한다.
      cron: ${NOTIFICATION_CLEANUP_CRON:0 0 3 * * *}                     # 알림 정리 스케줄 실행 시각. 기본값은 매일 새벽 3시.
  mqtt:
    enabled: ${MQTT_ENABLED:false}                                # MQTT 연동 활성화 여부.
    broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}          # MQTT Broker 접속 주소.
    client-id: ${MQTT_CLIENT_ID:carry-porter-server}             # 서버가 MQTT Broker에 접속할 때 사용할 클라이언트 아이디.
    username: ${MQTT_USERNAME:}                                  # MQTT Broker 인증용 사용자명. 로컬 개발에서는 비워둘 수 있음.
    password: ${MQTT_PASSWORD:}                                  # MQTT Broker 인증용 비밀번호. 로컬 개발에서는 비워둘 수 있음.
    completion-timeout: ${MQTT_COMPLETION_TIMEOUT:5000}          # MQTT 송수신 완료를 기다리는 최대 시간(ms).
    inbound:
      topic: ${MQTT_INBOUND_TOPIC:$share/carry-porter/v1/robots/+/event/#} # shared subscription 으로 동일 로봇 이벤트를 여러 인스턴스 중 하나만 소비하도록 하는 topic 패턴.
      qos: ${MQTT_INBOUND_QOS:1}                                 # inbound 메시지 수신 시 사용할 QoS.
    outbound:
      default-topic: ${MQTT_OUTBOUND_DEFAULT_TOPIC:v1/robots/unknown/command/departure} # 기본 publish topic. 실제 전송 시 header로 덮어쓴다.
      qos: ${MQTT_OUTBOUND_QOS:1}                                # outbound 메시지 발행 시 사용할 QoS.
