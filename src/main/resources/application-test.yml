  enabled: true  # trueлЎң н•ҳл©ҙ н…ҢмҠӨнҠём—җм„ңлҸ„ mmмқҙ к°Җкі , falseлЎң н•ҳл©ҙ mmмқҙ к°Җм§Җ м•ҠмқҢ
  webhook-url: ${TEST_MM_WEBHOOK_URL:https://meeting.ssafy.com/hooks/yoqix7fof3fo3fczu7i64z7yqr}