spring:
  config:
    activate:
      on-profile: test
  main:
    allow-bean-definition-overriding: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # datasource, redisлҠ” Testcontainers @ServiceConnection + @DynamicPropertySourceлЎң мһҗлҸҷ м„Өм •лҗЁ

mqtt:
  broker:
    # IntegrationTestSupportмқҳ DynamicPropertySourceк°Җ лҸҷм ҒмңјлЎң м„Өм •
    url: tcp://${MQTT_HOST:localhost}:${MQTT_PORT:1883}
    username:
    password:
  client:
    id: carryporter-test-client

