services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ${MQTT_CONTAINER_NAME:-carry-porter-mosquitto}
    ports:
      - "${MQTT_BROKER_PORT:-1883}:1883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./data:/mosquitto/data
      - ./log:/mosquitto/log
    restart: unless-stopped
