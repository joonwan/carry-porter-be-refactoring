services:
  mysql:
    image: mysql:8.0
    container_name: carry-porter-mysql-local
    environment:
      MYSQL_DATABASE: ${MULTI_DB_NAME:-carry_porter}
      MYSQL_ROOT_PASSWORD: ${MULTI_DB_PASSWORD:-1234}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MULTI_DB_HOST_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MULTI_DB_PASSWORD:-1234}"]
      # 10 초마다 health check 실행
      interval: 10s
      # health check 명령이 5초안에 끝나지 않을 경우 실패로 간주
      timeout: 5s
      # 연속 10 번 실패시 unhealthy 판단
      retries: 10
      # container 시작 후 처음 20초는 준비시간 (mysql 부팅 시간)
      start_period: 20s
    volumes:
      - ./infra/mysql/data:/var/lib/mysql

    # 컨테이너가 예기치 않게 죽을 경우 자동으로 다시 시작
    # 사용자가 명ㅅ적으로 docker stop 한 경우 재시작 안함.
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: carry-porter-mosquitto-local
    ports:
      - "${MULTI_MQTT_HOST_PORT:-1884}:1883"
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "127.0.0.1", "-p", "1883", "-t", "$$SYS/broker/version", "-C", "1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./infra/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./infra/mosquitto/data:/mosquitto/data
      - ./infra/mosquitto/log:/mosquitto/log
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: carry-porter-redis-local
    ports:
      - "${MULTI_REDIS_HOST_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - ./infra/redis/data:/data
    restart: unless-stopped

  app-1:
    # service 의 이미지를 어떻게 빌드할지
    build:
      # docker build context 를 현재 디렉토리로 설정
      # docker 는 build 시 context 안에 있는 파일만 볼 수 있음.
      # 즉 이 프로젝트 root 전체를 docker image build 재료로 쓰겠다 는 의미.
      context: .
      dockerfile: Dockerfile
    container_name: carry-porter-app-1
    # mysql 과 mosquitto 가 정상적으로 뜨면 해당 container 실행
    depends_on:
      mysql:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MULTI_DB_NAME:-carry_porter}
      DB_USERNAME: root
      DB_PASSWORD: ${MULTI_DB_PASSWORD:-1234}
      JPA_DDL_AUTO: ${MULTI_JPA_DDL_AUTO:-create}
      JPA_FORMAT_SQL: ${MULTI_JPA_FORMAT_SQL:-true}
      JPA_SHOW_SQL: ${MULTI_JPA_SHOW_SQL:-true}
      MQTT_ENABLED: ${MULTI_MQTT_ENABLED:-true}
      MQTT_BROKER_URL: tcp://mosquitto:1883
      MQTT_CLIENT_ID: carry-porter-server-app-1
      MQTT_COMPLETION_TIMEOUT: ${MQTT_COMPLETION_TIMEOUT:-5000}
      MQTT_INBOUND_TOPIC: ${MQTT_INBOUND_TOPIC:-$$share/carry-porter/v1/robots/+/event/#}
      MQTT_INBOUND_QOS: ${MQTT_INBOUND_QOS:-1}
      MQTT_OUTBOUND_DEFAULT_TOPIC: ${MQTT_OUTBOUND_DEFAULT_TOPIC:-v1/robots/unknown/command/departure}
      MQTT_OUTBOUND_QOS: ${MQTT_OUTBOUND_QOS:-1}
      JWT_SECRET: ${JWT_SECRET:-carry-porter-jwt-secret-key-carry-porter-2026}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-3600000}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-1209600000}
      NOTIFICATION_RETENTION_DAYS: ${NOTIFICATION_RETENTION_DAYS:-3}
      NOTIFICATION_CLEANUP_CRON: ${NOTIFICATION_CLEANUP_CRON:-0 0 3 * * *}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
    ports:
      - "${APP_1_HOST_PORT:-8081}:8080"
    restart: unless-stopped

  app-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carry-porter-app-2
    depends_on:
      mysql:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MULTI_DB_NAME:-carry_porter}
      DB_USERNAME: root
      DB_PASSWORD: ${MULTI_DB_PASSWORD:-1234}
      JPA_DDL_AUTO: ${MULTI_JPA_DDL_AUTO:-create}
      JPA_FORMAT_SQL: ${MULTI_JPA_FORMAT_SQL:-true}
      JPA_SHOW_SQL: ${MULTI_JPA_SHOW_SQL:-true}
      MQTT_ENABLED: ${MULTI_MQTT_ENABLED:-true}
      MQTT_BROKER_URL: tcp://mosquitto:1883
      MQTT_CLIENT_ID: carry-porter-server-app-2
      MQTT_COMPLETION_TIMEOUT: ${MQTT_COMPLETION_TIMEOUT:-5000}
      MQTT_INBOUND_TOPIC: ${MQTT_INBOUND_TOPIC:-$$share/carry-porter/v1/robots/+/event/#}
      MQTT_INBOUND_QOS: ${MQTT_INBOUND_QOS:-1}
      MQTT_OUTBOUND_DEFAULT_TOPIC: ${MQTT_OUTBOUND_DEFAULT_TOPIC:-v1/robots/unknown/command/departure}
      MQTT_OUTBOUND_QOS: ${MQTT_OUTBOUND_QOS:-1}
      JWT_SECRET: ${JWT_SECRET:-carry-porter-jwt-secret-key-carry-porter-2026}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-3600000}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-1209600000}
      NOTIFICATION_RETENTION_DAYS: ${NOTIFICATION_RETENTION_DAYS:-3}
      NOTIFICATION_CLEANUP_CRON: ${NOTIFICATION_CLEANUP_CRON:-0 0 3 * * *}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
    ports:
      - "${APP_2_HOST_PORT:-8082}:8080"
    restart: unless-stopped
